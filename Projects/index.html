<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Character Counter</title>
</head>

<body>
    <div class="container">
        <h2>Real-time Character Counter</h2>
        <textarea id="inputText" placeholder="Type something... Max 50 characters" maxlength="50">
        </textarea>
        <div class="counter-container">
            <p>Total Characters:</p>
            <p>Remaining:</p>
        </div>
    </div>
</body>


</html>
