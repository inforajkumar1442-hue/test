<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three_Images_In_One_Image</title>
</head>
<style>
    .main {
        position: relative;
        width: 50%;
        left: 200px;
    }

    img.First {
        position: absolute;
        width: 250px;
        left: -130px;
    }

    img.Third {
        position: absolute;
        width: 250px;
        bottom: -50px;
        RIGHT: -90px;
    }

    img.Second {
        width: 100%;
    }
</style>

<body>
    <div class="main">
        <img class="First" src="/images/1.0.jpg">
        <img class="Second" src="/images/2.0.jpg">
        <img class="Third" src="/images/3.0.jpg">
    </div>
</body>

</html>
