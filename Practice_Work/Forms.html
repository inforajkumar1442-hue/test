<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        .Header {
            display: flex;
            align-items: center;
        }

        * {
            padding: 0%;
            margin: 0%;
        }

        .image img {
            width: 100%;
        }

        .image {
            width: 60%;
        }

        form.Forms {
            width: 40%;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="Header">
        <div class="image">
            <img src="/images/Inst.png">
        </div>
        <form class="Forms">
            <p>Log into Instagram</p>
            <input type="text" placeholder="Mobile number, username or email"></br>
            <input type="password" placeholder="Password"></br>
            <button>Log in</button></br>
            <button>Forget password?</button></br>
            <button>Log in with Facebook</button></br>
            <button>Create new account</button>
        </form>
    </div>
</body>

</html>
