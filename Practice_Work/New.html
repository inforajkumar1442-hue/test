<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Document</title>
</head>
<body>
    
    <div class="form-section">
        <h1>Form Section</h1>
        <form action="">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="email"><i class="fa fa-unlock-alt test" aria-hidden="true"></i> password</label>   

            <input type="email" id="email" name="email"><br><br>
            <input type="submit" value="Submit"><br>
            <textarea name="message" id="message" cols="50" rows="20" placeholder="message"></textarea>><br><br>
            <select name="options" id="options">
                <option value="option1">Option 1</option>
                <option value="option2">Option 2</option>
                <option value="option3">Option 3</option>
            </select>
<input type="month" id="month" name="month"><br><br>
<input type="week" id="week" name="week"><br><br>
<input type="time" id="time" name="time"><br><br>
<input type="number" id="number" name="number" min="3" max="10"><br><br>

        </form>
<input type="range" id="range" name="range" min="0" max="100"><br><br>
    </div>
</body>
</html>
