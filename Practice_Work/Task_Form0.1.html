<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Form</title>
</head>
<style>
    .main {
        display: flex;
        background-color: #fce8e9;
        align-items: center;
        justify-content: center;
        gap: 70px;
    }

    .images {
        width: 40%;
    }

    .images img {
        width: 100%;
    }

    .form {
        width: 40%;
    }

    input {
        border: none;
        border-bottom: 1px solid;
        background: transparent;
        width: 49%;
    }

    img.Google {
        width: 12px;
    }

    a.Sign {
        text-decoration: none;
    }

    a.Account {
        text-decoration: none;
        color: black;
    }

    button {
        width: 71%;
        padding: 12px 0;
        margin-top: 21px;
        border-radius: 10px 1px;
    }

    i.fa.fa-envelope {
        width: 20px;
    }

    i.fa.fa-unlock-alt {
        width: 15px;
    }

   p {
    margin-left: 100px;
}

    input {
        width: 70%;
        margin-bottom: 25px;
    }
</style>

<body>
    <div class="Outer">
        <div class="Container">
            <div class="main">
                <div class="images">
                    <img src="/images/boy.png">
                </div>
                <div class="form">
                    <form>
                        <h2>Create your account</h2>
                        <label for="Name">Name</label><br>
                        <input type="text" id="Name" name="Name"></br>
                        <label for="Email"><i class="fa fa-envelope" aria-hidden="true"></i>Email</label><br>
                        <input type="text" id="Email" name="Email"></br>
                        <label for="Password"><i class="fa fa-unlock-alt" aria-hidden="true"></i>Password</label></br>
                        <input type="password" id="Password" name="Password"></br>
                        <button>Create Account</button><br>
                        <button> <img src="/images/google.png" class="Google">Sign up with Google</button>
                        <p><a href="" class="Account"> Already have an account?</a> <a href="" style="color: red;"
                                class="Sign">Sign in</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
